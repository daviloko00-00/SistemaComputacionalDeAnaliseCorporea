<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação de Email</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 80px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        #reauth {
            color: red;
            margin-top: 15px;
        }

        #msg {
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Verificação de Email</h2>

        <p id="msg">Verificando...</p>

        <p id="reauth" style="display:none;">
            Token expirado ou inválido. Se não recebeu o e-mail, solicite outro link.
        </p>

        <input 
            type="email" 
            id="inputEmail" 
            placeholder="Digite seu email"
            style="display:none;"
        >

        <br>

        <button id="btnReenviar" style="display:none;">
            Reenviar e-mail
        </button>
    </div>

    <script>
        const msg = document.getElementById("msg");
        const btnReenviar = document.getElementById("btnReenviar");
        const reauth = document.getElementById("reauth");
        const inputEmail = document.getElementById("inputEmail");

        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");

        async function parseResponse(response) {
            const text = await response.text();

            if (!text) {
                return {};
            }

            try {
                return JSON.parse(text);
            } catch {
                return {};
            }
        }

        async function verificarEmail() {
            if (!token) {
                msg.innerText = "Token não encontrado na URL.";
                return;
            }
            const link = "http://localhost:3000";
            const path = "/auth/verificar-email?token="

            try {
                const response = await fetch(
                    `${link}${path}${encodeURIComponent(token)}`
                );

                const data = await parseResponse(response);

                if (!response.ok) {
                    msg.innerText = data.erro || "Erro ao verificar email.";
                    reauth.style.display = "block";
                    inputEmail.style.display = "inline-block";
                    btnReenviar.style.display = "inline-block";
                    return;
                }

                msg.innerText = data.msg || "Email verificado com sucesso!";
                reauth.style.display = "none";
                inputEmail.style.display = "none";
                btnReenviar.style.display = "none";

            } catch (error) {
                msg.innerText = "Erro: API não respondeu.";

                reauth.style.display = "block";
                inputEmail.style.display = "inline-block";
                btnReenviar.style.display = "inline-block";
            }
        }

        btnReenviar.addEventListener("click", async () => {
            try {
                const email = inputEmail.value.trim();

                if (!email) {
                    msg.innerText = "Digite seu e-mail.";
                    inputEmail.focus();
                    return;
                }

                btnReenviar.disabled = true;
                btnReenviar.innerText = "Enviando...";

                const response = await fetch("http://localhost:3000/auth/reenviar-email", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email })
                });

                const data = await parseResponse(response);

                if (!response.ok) {
                    msg.innerText = data.erro || "Erro ao reenviar email.";
                    return;
                }

                msg.innerText =
                    data.msg || "Novo link enviado para seu email.";

                reauth.style.display = "none";
                inputEmail.style.display = "none";
                btnReenviar.style.display = "none";

            } catch (error) {
                msg.innerText = "Erro ao reenviar email.";
            } finally {
                btnReenviar.disabled = false;
                btnReenviar.innerText = "Reenviar e-mail";
            }
        });

        verificarEmail();
    </script>

</body>
</html>
