<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      width: 400px;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      width: 100%;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: #0056b3;
    }

    #msg {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }

    .erro {
      color: #dc3545;
    }

    .sucesso {
      color: #28a745;
    }

    .link-cadastro {
      text-align: center;
      margin-top: 15px;
    }

    .link-cadastro a {
      color: #007bff;
      text-decoration: none;
    }

    .link-cadastro a:hover {
      text-decoration: underline;
    }

    .retorno {
      display: none;
      text-align: center;
      margin-top: 15px;
    }

    .retorno-info {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Login</h2>

    <form id="formLogin">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <button type="submit" id="btnLogin">Entrar</button>
    </form>

    <p id="msg"></p>

    <div class="retorno" id="retorno">
      <div class="retorno-info">
        <p><strong>Token:</strong></p>
        <p id="token" style="word-break: break-all; font-size: 12px;"></p>
      </div>
      <div class="retorno-info" style="margin-top: 10px;">
        <p id="retornoUsuario"></p>
      </div>
    </div>

    <div class="link-cadastro">
      <a href="index.html">Não tem conta? Cadastre-se</a>
    </div>
  </div>

  <script>
    const form = document.getElementById("formLogin");
    const msg = document.getElementById("msg");
    const btnLogin = document.getElementById("btnLogin");
    const retorno = document.getElementById("retorno");
    const tokenEl = document.getElementById("token");
    const retornoUsuario = document.getElementById("retornoUsuario");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      btnLogin.disabled = true;
      btnLogin.innerText = "Entrando...";
      msg.innerText = "";
      retorno.style.display = "none";

      const email = document.getElementById("email").value;
      const senha = document.getElementById("senha").value;
      const link = "https://7406-2804-868-d057-4274-2886-64c9-196e-1bb6.ngrok-free.app";
      const path = "/auth/login"
      try {
        const response = await fetch(link+path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok) {
          msg.innerText = data.erro || "Erro no login";
          msg.className = "erro";
          return;
        }

        msg.innerText = data.msg;
        msg.className = "sucesso";

        // Mostrar token e dados do usuário
        tokenEl.innerText = data.token;
        retornoUsuario.innerText = `Bem-vindo, ${data.usuario.nome}!`;
        retorno.style.display = "block";

      } catch (error) {
        msg.innerText = "Erro: API não respondeu";
        msg.className = "erro";
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerText = "Entrar";
      }
    });
  </script>

</body>
</html>
